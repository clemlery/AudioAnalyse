{% if error %}
<p class="msg-error">Error: {{ error }}</p>
{% elif not chart_b64 %}
<p class="muted">No data available.</p>
{% else %}
<div class="chart-container">
    <img src="data:image/png;base64,{{ chart_b64 }}" alt="Chart" class="chart-img">
</div>
<div class="table-container">
    {{ table_html | safe }}
</div>
<a href="{{ csv_uri }}" download="{{ filename }}" class="btn btn-outline">Download CSV</a>
{% endif %}
